{% extends 'base.html' %}
{% block content %}

<style>
.center-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.glass-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    color: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.glass-card h3 {
    text-align: center;
    margin-bottom: 30px;
}

.form-control {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 12px;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.8);
}

.form-control:focus {
    background: rgba(255,255,255,0.25);
    color: white;
    box-shadow: none;
}

.btn-dark {
    background: black;
    border: none;
    padding: 10px;
}

.btn-dark:hover {
    background: #222;
}
</style>

<div class="center-wrapper">

    <div class="glass-card">
        <h3>Login</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="mb-4">
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <button type="submit" class="btn btn-dark w-100">
                Login
            </button>

            <p class="text-center mt-4">
                Don’t have an account?
                <a href="{% url 'register' %}" class="text-white fw-semibold">
                    Register here
                </a>
            </p>
        </form>
    </div>

</div>

{% endblock %}
